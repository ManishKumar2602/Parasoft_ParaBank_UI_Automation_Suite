[pytest]

testpaths=tests
python_files=test_*.py
python_classes=Test*
python_functions=test_*

markers=
     smoke: Fast critical-path tests
     regression: Full regression suite
     critical: Critical path tests
     api: Tests that hit HTTP endpoints
     db: Tests that require a database
     slow: Tests that take more time than 5 seconds
     wip: Work-in-progress, skipped in CI

addopts=
   -v
   -s
   --html=reports/test_report.html
   --self-contained-html
   --tb=short
   --strict-markers
   -ra

log_cli=true
log_cli_level=INFO
log_cli_format=%(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format=%Y-%m-%d %H:%M:%S

log_file=logs/pytest_run.log
log_file_level=DEBUG
log_file_format=%(asctime)s [%(levelname)s] %(name)s: %(message)s
log_file_date_format=%Y-%m-%d %H:%M:%S